<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب منتج جديد</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 15px; }
        .table-badge { text-align: center; background: #e67e22; color: white; padding: 6px; border-radius: 20px; font-weight: bold; margin-bottom: 25px; font-size: 14px; display: flex; justify-content: space-around; }
        .product-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eaeded; border-radius: 12px; margin-bottom: 15px; background: #fff; }
        .product-details { display: flex; align-items: center; gap: 15px; }
        .product-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #f0f3f4; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #2c3e50; }
        .product-info span { color: #e74c3c; font-weight: bold; font-size: 14px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #3498db; color: white; border: none; width: 32px; height: 32px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .qty-val { font-weight: bold; width: 20px; text-align: center; font-size: 16px; }
        .order-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #menuSection { display: block; }

        .success-card { display: none; text-align: center; margin-top: 20px; padding: 20px; border-radius: 10px; border: 1px solid #ccc; background: #fdfefe; }
        .order-num { font-size: 28px; color: #2c3e50; display: block; margin: 10px 0; font-weight: bold; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .status-pending { background: #f1c40f; color: #7f6000; }
        .status-ready { background: #2ecc71; color: #fff; animation: pulse 1.5s infinite; }
        
        .request-bill-btn { width: 100%; background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
        .new-order-btn { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>منيو الطلبات ✨</h2>
    <p class="subtitle">اختر الكمية واضغط على إرسال الطلب</p>
    
    <div class="table-badge" id="infoDisplay">
        <span id="branchDisplay">🏢 الفرع: جاري التحميل...</span>
        <span id="tableDisplay">📌 ترابيزة: جاري التحميل...</span>
    </div>

    <div id="menuSection">
        <div class="product-card" data-id="p1" data-name="قهوة إسبريسو" data-price="50">
            <div class="product-details">
                <img src="https://images.unsplash.com/photo-1510972527409-cac236c51db1?w=150" alt="قهوة إسبريسو" class="product-img">
                <div class="product-info">
                    <h3>قهوة إسبريسو</h3>
                    <span>50 ج.م</span>
                </div>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('p1', -1)">-</button>
                <span class="qty-val" id="qty-p1">0</span>
                <button class="qty-btn" onclick="changeQty('p1', 1)">+</button>
            </div>
        </div>

        <div class="product-card" data-id="p2" data-name="كرواسون شيكولاتة" data-price="45">
            <div class="product-details">
                <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=150" alt="كرواسون شيكولاتة" class="product-img">
                <div class="product-info">
                    <h3>كرواسون شيكولاتة</h3>
                    <span>45 ج.م</span>
                </div>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('p2', -1)">-</button>
                <span class="qty-val" id="qty-p2">0</span>
                <button class="qty-btn" onclick="changeQty('p2', 1)">+</button>
            </div>
        </div>

        <button class="order-btn" id="submitBtn" onclick="submitOrder()">إتمام الطلب برقم 🚀</button>
    </div>

    <div class="success-card" id="successCard">
        <h3>طلبك الحالي قيد المتابعة! 🎉</h3>
        <p>رقم الأوردر الخاص بك:</p>
        <span class="order-num" id="displayOrderNum">#0000</span>
        <hr style="border: 1px dashed #eaeded; margin: 15px 0;">
        <p style="margin-bottom: 5px; font-weight: bold;">حالة الطلب الآن:</p>
        <span id="orderStatusBadge" class="status-badge status-pending">قيد الاستلام ⏳</span>
    </div>

    <button class="request-bill-btn" id="billBtn" onclick="askForBill()">طلب الحساب 💸</button>
    <button class="new-order-btn" id="newOrderBtn" onclick="resetForNewOrder()">عمل طلب جديد ☕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

    firebase.initializeApp(firebaseConfig);

    let branchName = urlParams.get('branch') || "main";        
    let tableNumber = urlParams.get('table') || "تيك أواي";     
    
    document.getElementById('branchDisplay').innerText = "🏢 الفرع: " + branchName;
    document.getElementById('tableDisplay').innerText = "📌 ترابيزة: " + tableNumber;

    const cart = { p1: 0, p2: 0 };
    let currentOrderNumber = null;

    window.onload = function() {
        const savedOrder = localStorage.getItem('activeOrderId');
        if (savedOrder) {
            currentOrderNumber = savedOrder;
            showTrackingScreen(savedOrder);
            trackOrderStatusLive(savedOrder);
        }
    }

    function changeQty(id, change) {
        cart[id] = Math.max(0, cart[id] + change);
        document.getElementById(`qty-${id}`).innerText = cart[id];
    }

    function submitOrder() {
        const orderItems = [];
        let total = 0;
        document.querySelectorAll('.product-card').forEach(card => {
            const id = card.getAttribute('data-id');
            const name = card.getAttribute('data-name');
            const price = parseInt(card.getAttribute('data-price'));
            const qty = cart[id];
            if (qty > 0) {
                orderItems.push({ name: name, price: price, qty: qty });
                total += (price * qty);
            }
        });
