<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب منتج جديد</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 15px; }
        .table-badge { text-align: center; background: #e67e22; color: white; padding: 6px; border-radius: 20px; font-weight: bold; margin-bottom: 25px; font-size: 14px; }
        .product-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eaeded; border-radius: 12px; margin-bottom: 15px; background: #fff; }
        .product-details { display: flex; align-items: center; gap: 15px; }
        .product-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #f0f3f4; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #2c3e50; }
        .product-info span { color: #e74c3c; font-weight: bold; font-size: 14px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #3498db; color: white; border: none; width: 32px; height: 32px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .qty-val { font-weight: bold; width: 20px; text-align: center; font-size: 16px; }
        .order-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* 🌟 ستايل كارت النجاح ومتابعة الأوردر الجديد */
        .success-card { display: none; text-align: center; margin-top: 20px; padding: 20px; border-radius: 10px; border: 1px solid #ccc; background: #fdfefe; }
        .order-num { font-size: 28px; color: #2c3e50; display: block; margin: 10px 0; font-weight: bold; }
        
        /* 🚨 ستايل حالات الأوردر */
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .status-pending { background: #f1c40f; color: #7f6000; } /* قيد الاستلام */
        .status-ready { background: #2ecc71; color: #fff; animation: pulse 1.5s infinite; } /* جاهز */
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>منيو الطلبات ✨</h2>
    <p class="subtitle">اختر الكمية واضغط على إرسال الطلب</p>
    
    <div class="table-badge" id="tableDisplay">جاري تحديد رقم الترابيزة...</div>

    <div class="product-card" data-id="p1" data-name="قهوة إسبريسو" data-price="50">
        <div class="product-details">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/7942207945039224329_0" alt="قهوة إسبريسو" class="product-img">
            <div class="product-info">
                <h3>قهوة إسبريسو</h3>
                <span>50 ج.م</span>
            </div>
        </div>
        <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('p1', -1)">-</button>
            <span class="qty-val" id="qty-p1">0</span>
            <button class="qty-btn" onclick="changeQty('p1', 1)">+</button>
        </div>
    </div>

    <div class="product-card" data-id="p2" data-name="كرواسون شيكولاتة" data-price="45">
        <div class="product-details">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/8485153849441852338_0" alt="كرواسون شيكولاتة" class="product-img">
            <div class="product-info">
                <h3>كرواسون شيكولاتة</h3>
                <span>45 ج.م</span>
            </div>
        </div>
        <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('p2', -1)">-</button>
            <span class="qty-val" id="qty-p2">0</span>
            <button class="qty-btn" onclick="changeQty('p2', 1)">+</button>
        </div>
    </div>

    <button class="order-btn" id="submitBtn" onclick="submitOrder()">إتمام الطلب برقم 🚀</button>

    <div class="success-card" id="successCard">
        <h3>تم إرسال طلبك بنجاح! 🎉</h3>
        <p>رقم الأوردر الخاص بك:</p>
        <span class="order-num" id="displayOrderNum">#0000</span>
        <hr style="border: 1px dashed #eaeded; margin: 15px 0;">
        <p style="margin-bottom: 5px; font-weight: bold;">حالة الطلب الآن:</p>
        <span id="orderStatusBadge" class="status-badge status-pending">قيد الاستلام ⏳</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDBuBOcY9mbCXZIVIhkTjOhaor4VsrTPx8",
        authDomain: "scan-order-system.firebaseapp.com",
        projectId: "scan-order-system",
        storageBucket: "scan-order-system.firebasestorage.app",
        messagingSenderId: "1066014113516",
        appId: "1:1066014113516:web:61ef0f2dc366b0e9d8afc9",
        databaseURL: "https://scan-order-system-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    let tableNumber = urlParams.get('table');

    if (tableNumber) {
        document.getElementById('tableDisplay').innerText = "📌 أنت في ترابيزة رقم: " + tableNumber;
    } else {
        tableNumber = prompt("من فضلك أدخل رقم الترابيزة الخاصة بك:");
        if(!tableNumber) tableNumber = "غير محدد";
        document.getElementById('tableDisplay').innerText = "📌 ترابيزة رقم: " + tableNumber;
    }

    const cart = { p1: 0, p2: 0 };
    function changeQty(id, change) {
        cart[id] = Math.max(0, cart[id] + change);
        document.getElementById(`qty-${id}`).innerText = cart[id];
    }

    function submitOrder() {
        const orderItems = [];
        let total = 0;
        document.querySelectorAll('.product-card').forEach(card => {
            const id = card.getAttribute('data-id');
            const name = card.getAttribute('data-name');
            const price = parseInt(card.getAttribute('data-price'));
            const qty = cart[id];
            if (qty > 0) {
                orderItems.push({ name: name, price: price, qty: qty });
                total += (price * qty);
            }
        });

        if (orderItems.length === 0) {
            alert("عذراً، يجب اختيار منتج واحد على الأقل!");
            return;
        }

        const orderNumber = Math.floor(1000 + Math.random() * 9000);
        const orderData = {
            orderId: orderNumber,
            tableNum: tableNumber,
            items: orderItems,
            totalPrice: total,
            status: "قيد الاستلام", // 🌟 بيبدأ بـ قيد الاستلام
            time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
        };

        database.ref('orders/' + orderNumber).set(orderData)
        .then(() => {
            document.getElementById('displayOrderNum').innerText = "#" + orderNumber;
            document.getElementById('successCard').style.display = "block";
            document.getElementById('submitBtn').style.display = "none"; // إخفاء زرار الطلب عشان ما يطلبش تاني بالغلط
            
            // 🚨 تشغيل المراقبة الحية لحالة الأوردر ده بالظبط
            trackOrderStatusLive(orderNumber);
        })
        .catch(error => { alert("حدث خطأ، حاول مرة أخرى."); });
    }

    // 🔄 دالة سحرية بتراقب الأوردر في الداتا بيز لو حالته اتغيرت عند الأدمن
    function trackOrderStatusLive(orderNum) {
        database.ref('orders/' + orderNum).on('value', (snapshot) => {
            const orderData = snapshot.val();
            
            // لو الأدمن مسح الأوردر (دفع حساب)
            if (!orderData) {
                document.getElementById('orderStatusBadge').innerText = "تم إنهاء الحساب والزيارة 👋✨";
                document.getElementById('orderStatusBadge').className = "status-badge";
                document.getElementById('orderStatusBadge').style.background = "#95a5a6";
                return;
            }

            const badge = document.getElementById('orderStatusBadge');
            if (orderData.status === "تم التجهيز") {
                badge.innerText = "جاهز للتسليم ✓ 🎉";
                badge.className = "status-badge status-ready";
            } else {
                badge.innerText = "قيد الاستلام ⏳";
                badge.className = "status-badge status-pending";
            }
        });
    }
</script>
</body>
</html>
